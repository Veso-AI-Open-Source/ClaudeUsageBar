<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
  <title>Claude Usage</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <div id="loading" class="state hidden">
      <div class="spinner"></div>
      <p>Loading usage data…</p>
    </div>

    <div id="error-state" class="state hidden">
      <div class="icon-warning">!</div>
      <p id="error-text"></p>
      <p class="muted">Open Claude Code to sign in, then retry.</p>
      <div class="row gap8 center">
        <button class="btn" id="error-retry">Retry</button>
        <button class="btn" id="error-reread">Re-read credentials</button>
      </div>
    </div>

    <div id="content" class="hidden">
      <div id="banner" class="banner hidden"></div>
      <div id="stale" class="stale hidden"></div>

      <section class="block">
        <div class="row baseline">
          <span class="label-strong">Session</span>
          <span class="spacer"></span>
          <span class="metric-big" id="session-pct">—</span>
        </div>
        <div class="bars">
          <div class="bar"><div class="bar-fill" id="session-bar"></div></div>
          <div class="bar reset-bar"><div class="bar-fill reset-fill" id="session-elapsed"></div></div>
        </div>
        <div class="row caption muted">
          <span id="session-reset"></span>
          <span class="spacer"></span>
          <span id="burning"></span>
        </div>
      </section>

      <div class="divider"></div>

      <section class="block">
        <div class="row baseline">
          <span class="label-soft">Weekly</span>
          <span class="spacer"></span>
          <span class="metric-med" id="weekly-pct">—</span>
          <span class="dot-sep muted hidden" id="weekly-dot">·</span>
          <span class="caption muted" id="weekly-reset"></span>
        </div>
        <div class="bar small"><div class="bar-fill" id="weekly-bar"></div></div>
      </section>

      <div class="divider"></div>

      <section class="block">
        <button class="details-toggle" id="details-toggle">
          <span class="chev">▶</span><span>Details</span>
        </button>
        <div id="details" class="details hidden"></div>
      </section>

      <div class="divider"></div>

      <footer class="footer">
        <span id="plan" class="plan">—</span>
        <span class="spacer"></span>
        <span id="updated" class="muted caption"></span>
        <button class="iconbtn" id="refresh" title="Refresh">⟳</button>
        <button class="iconbtn" id="quit" title="Quit">✕</button>
      </footer>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
